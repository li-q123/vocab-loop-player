<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#eef3f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="生词循环">
  <title>生词循环播放器</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="player-panel" aria-labelledby="app-title">
      <div class="topbar">
        <div>
          <p class="eyebrow">Vocabulary Loop</p>
          <h1 id="app-title">生词循环播放器</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" title="添加到主屏幕" hidden>+</button>
      </div>

      <div class="now-card" aria-live="polite">
        <div class="status-line">
          <span id="playState">准备播放</span>
          <span id="wordCounter">0 / 0</span>
        </div>
        <div class="word-display" id="currentWord">添加一个单词开始</div>
        <div class="phonetic-display" id="currentPhonetic"></div>
        <div class="meaning-display" id="currentMeaning">英文读音、英文拼写、中文意思会自动循环播放</div>
        <div class="phase-track" aria-hidden="true">
          <span id="phaseEnglish">英</span>
          <span id="phaseSpell">拼</span>
          <span id="phaseChinese">中</span>
        </div>
      </div>

      <div class="controls" aria-label="播放控制">
        <button id="prevButton" type="button" title="上一个" aria-label="上一个">‹</button>
        <button id="playButton" class="primary" type="button">播放</button>
        <button id="pauseButton" type="button">暂停</button>
        <button id="stopButton" type="button">停止</button>
        <button id="nextButton" type="button" title="下一个" aria-label="下一个">›</button>
      </div>

      <div class="settings-grid">
        <label>
          语速
          <input id="rateInput" type="range" min="0.6" max="1.2" step="0.1" value="0.9">
          <span id="rateLabel">0.9x</span>
        </label>
        <label>
          间隔
          <input id="gapInput" type="range" min="300" max="2500" step="100" value="900">
          <span id="gapLabel">0.9s</span>
        </label>
        <label class="checkbox-row">
          <input id="shuffleInput" type="checkbox">
          随机播放
        </label>
        <label class="checkbox-row">
          <input id="repeatInput" type="checkbox" checked>
          播完继续循环
        </label>
      </div>
    </section>

    <section class="editor-panel" aria-labelledby="add-title">
      <form id="wordForm" class="word-form">
        <h2 id="add-title">添加生词</h2>
        <label>
          英文单词
          <input id="wordInput" name="word" type="text" autocomplete="off" placeholder="example" required>
        </label>
        <label>
          音标
          <input id="phoneticInput" name="phonetic" type="text" autocomplete="off" placeholder="自动查，也可手填">
        </label>
        <label>
          中文意思
          <input id="meaningInput" name="meaning" type="text" autocomplete="off" placeholder="例子" required>
        </label>
        <p class="lookup-status" id="lookupStatus">输入英文单词后会自动查中文意思和音标</p>
        <button class="primary" type="submit">添加</button>
      </form>

      <div class="list-header">
        <h2>我的词库</h2>
        <div class="list-actions">
          <button id="sampleButton" type="button">示例</button>
          <button id="exportButton" type="button">导出</button>
          <button id="clearButton" type="button">清空</button>
        </div>
      </div>
      <ul id="wordList" class="word-list" aria-label="单词列表"></ul>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
